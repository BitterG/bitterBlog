<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>字节编辑器</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="panel hero-panel">
      <div>
        <p class="eyebrow">Binary Byte Editor</p>
        <h1>GBFR 存档转换器</h1>
        <p class="lead">拖入存档或选择文件，输入 Steam ID 后按 gbfr-tool 逻辑写入第 5 到第 12 字节。</p>
      </div>
      <label class="drop-zone" id="dropZone">
        <input id="fileInput" type="file" hidden>
        <span class="drop-icon">+</span>
        <span class="drop-title">拖拽文件到这里</span>
        <span class="drop-subtitle">或点击选择本地文件</span>
      </label>
    </section>

    <section class="panel editor-panel">
      <div class="toolbar">
        <div class="file-meta">
          <span id="fileName">未选择文件</span>
          <span id="fileSize">0 bytes</span>
        </div>
        <div class="edit-controls">
          <label class="number-field">
            <span>Steam ID</span>
            <input id="numberInput" type="text" inputmode="numeric" placeholder="例如 7656119...">
          </label>
          <button id="applyBtn" type="button" disabled>转换 Steam ID</button>
          <button id="downloadBtn" type="button" disabled>下载修改后文件</button>
        </div>
      </div>
      <p class="status" id="status">等待文件。</p>
      <div class="hex-view" id="hexView" aria-label="文件字节十六进制视图"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
